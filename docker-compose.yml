services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env.local
    depends_on:
      - mcp-server

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    environment:
      PEPTIDE_API_URL: http://web:3000
      MCP_API_KEY: ${MCP_API_KEY:-dev-key}
    stdin_open: true

  # Hermes Agent — uncomment when deploying to VPS
